# DM2 Data Group to DoDAF View Mapping
# This file defines which DoDAF views each DM2 data group relates to.
# Used by ViewRecommender for data-group-activation-driven view recommendation.
# Editable without code changes — runtime loaded from disk.

groups:
  - id: "00-foundation"
    name: "Foundation"
    label: "Meta"
    description: "基础抽象层 — IDEAS 顶层本体、关联模式、命名约定、时态边界"
    group_views:
      - id: "All"
        description: "所有 DoDAF 视图的基础概念和模式"
    notes: "抽象层级，不直接推荐特定视图"

  - id: "01-performer"
    name: "Performer"
    label: "WHO"
    description: "执行者 — 系统、服务、组织、人员角色"
    group_views:
      - id: "OV-4"
        description: "组织关系图"
      - id: "PV-1"
        description: "项目组合关系图"

  - id: "02-activity"
    name: "Activity"
    label: "HOW/DO"
    description: "活动 — 流程、操作、功能、任务"
    group_views:
      - id: "OV-5a"
        description: "作战活动分解树"
      - id: "OV-5b"
        description: "作战活动模型"

  - id: "03-capability"
    name: "Capability"
    label: "WHY"
    description: "能力 — 能力需求、映射、差距和演进"
    group_views:
      - id: "CV-1"
        description: "能力愿景"
      - id: "CV-2"
        description: "能力分类"
      - id: "CV-3"
        description: "能力阶段规划"
      - id: "CV-4"
        description: "能力依赖"
      - id: "CV-5"
        description: "能力与组织映射"
      - id: "CV-6"
        description: "能力与作战活动映射"
      - id: "CV-7"
        description: "能力与服务映射"

  - id: "04-resource"
    name: "Resource"
    label: "WHAT flows"
    description: "资源 — 数据、信息、资产及数据流"
    group_views:
      - id: "OV-2"
        description: "作战节点连接"
      - id: "OV-3"
        description: "作战信息交换"
      - id: "SV-2"
        description: "系统接口描述"
      - id: "SV-6"
        description: "系统资源流矩阵"
      - id: "DIV-1"
        description: "概念数据模型"
      - id: "DIV-2"
        description: "逻辑数据模型"
      - id: "DIV-3"
        description: "物理数据模型"

  - id: "05-guidance"
    name: "Guidance"
    label: "WHAT rules (原文)"
    description: "指导性文件 — 法规、标准、规范原文"
    group_views:
      - id: "StdV-1"
        description: "标准配置文件"
      - id: "OV-6a"
        description: "作战规则模型"

  - id: "06-measure"
    name: "Measure"
    label: "HOW WELL"
    description: "度量 — 性能指标、质量度量、效果度量"
    group_views:
      - id: "SV-7"
        description: "系统度量矩阵"
      - id: "SvcV-7"
        description: "服务度量矩阵"

  - id: "07-location"
    name: "Location"
    label: "WHERE"
    description: "位置 — 物理位置、逻辑位置、虚拟位置"
    group_views:
      - id: "OV-1"
        description: "高级作战概念图"
      - id: "OV-2"
        description: "作战节点连接（位置上下文）"

  - id: "08-services"
    name: "Services"
    label: "WHAT (服务态)"
    description: "服务 — 服务接口、服务端口、服务编排"
    group_views:
      - id: "SvcV-1"
        description: "服务组合接口描述"
      - id: "SvcV-2"
        description: "服务资源流描述"
      - id: "SvcV-3"
        description: "服务-系统矩阵"
      - id: "SvcV-4"
        description: "服务功能描述"
      - id: "SvcV-5"
        description: "服务活动-服务功能可追踪性矩阵"
      - id: "SvcV-6"
        description: "服务资源流矩阵"
      - id: "SvcV-7"
        description: "服务度量矩阵"
      - id: "SvcV-8"
        description: "服务演进描述"
      - id: "SvcV-9"
        description: "服务技术与技能分类"
      - id: "SvcV-10a"
        description: "服务规则模型"
      - id: "SvcV-10b"
        description: "服务状态转换描述"
      - id: "SvcV-10c"
        description: "服务事件追踪描述"

  - id: "09-project"
    name: "Project"
    label: "WHEN / PAYS"
    description: "项目 — 项目阶段、里程碑、预算和进度"
    group_views:
      - id: "PV-1"
        description: "项目组合关系图"
      - id: "PV-2"
        description: "项目组合时间线"
      - id: "PV-3"
        description: "项目组合-能力映射"

  - id: "10-rules"
    name: "Rules"
    label: "WHAT rules (可执行)"
    description: "规则 — 条件、约束、需求、策略的可执行逻辑"
    group_views:
      - id: "SV-10a"
        description: "系统规则模型"
      - id: "SvcV-10a"
        description: "服务规则模型"

  - id: "11-resource-flow"
    name: "ResourceFlow"
    label: "HOW connected"
    description: "资源流 — 功能间数据流、接口关系、连接拓扑"
    group_views:
      - id: "SV-4"
        description: "系统功能描述"
      - id: "DIV-2"
        description: "逻辑数据模型"
      - id: "DIV-3"
        description: "物理数据模型"

  - id: "12-pedigree"
    name: "Pedigree"
    label: "Meta"
    description: "谱系 — 知识溯源、推导链、置信度"
    group_views:
      - id: "All"
        description: "所有视图的谱系追踪基础"
    notes: "抽象层级，提供推导链追踪能力"

  - id: "13-information-pedigree"
    name: "InformationPedigree"
    label: "Meta"
    description: "信息谱系 — 信息衍生、聚合、变换的血缘追踪"
    group_views:
      - id: "DIV-1"
        description: "概念数据模型（信息血缘支撑）"
      - id: "DIV-2"
        description: "逻辑数据模型（信息血缘支撑）"
    notes: "信息溯源层，增强数据视图的血缘语义"

  - id: "14-org-structure"
    name: "OrgStructure"
    label: "HOW organized"
    description: "组织结构 — 组织层级、汇报关系、干系人角色"
    group_views:
      - id: "OV-4"
        description: "组织关系图"

  - id: "15-reification"
    name: "Reification"
    label: "Meta"
    description: "具体化 — 抽象层次关系、类型-实例桥接"
    group_views:
      - id: "All"
        description: "支持抽象层次间的关系映射"
    notes: "抽象层级，提供 Type↔Individual 桥接语义"

  - id: "16-information-data"
    name: "InformationData"
    label: "WHAT data means"
    description: "信息与数据 — 数据模型、信息结构、数据元素定义"
    group_views:
      - id: "DIV-1"
        description: "概念数据模型"
      - id: "DIV-2"
        description: "逻辑数据模型"
      - id: "DIV-3"
        description: "物理数据模型"
