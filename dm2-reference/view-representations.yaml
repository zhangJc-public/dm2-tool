# DoDAF V2.0 视图表达形式对照表
#
# 数据来源：
#   - dodaf_v2-02_web.pdf (DoDAF V2.02 web, 289 pages)
#   - 2009美国国防部体系结构框架 - DoDAF V2.0 - Vol. 2.pdf (Vol 2: Architectural Data and Models)
#
# 分类体系 (dodaf_v2-02_web.pdf page 40):
#   Structural  - 结构/静态关系描述
#   Behavioral  - 行为/动态过程描述
#   Tree        - 层级分类/分解
#   Mapping     - 两类信息间的映射关系
#   Tabular     - 行列结构数据
#   Pictorial   - 自由图形描述
#   Timeline    - 时间线/阶段规划
#   Ontology    - 术语/本体定义
#
# 生成日期: 2026-05-05

# =============================================================================
# AV — All Viewpoint (全视点) — 2 views
# =============================================================================
- id: "AV-1"
  representation: text
  mermaid_type: none
  model_category: Tabular
  standard_name: "Overview and Summary Information"
  sections: ["项目概述", "愿景与目标", "范围与边界", "关键指标与效果"]

- id: "AV-2"
  representation: text
  mermaid_type: none
  model_category: Ontology
  standard_name: "Integrated Dictionary"
  sections: ["术语定义", "缩写表", "数据类型说明"]

# =============================================================================
# CV — Capability Viewpoint (能力视点) — 7 views
# =============================================================================
- id: "CV-1"
  representation: text
  mermaid_type: none
  model_category: Tabular
  standard_name: "Vision"
  sections: ["能力愿景", "战略背景", "能力范围", "预期效果"]

- id: "CV-2"
  representation: tree
  mermaid_type: graph
  model_category: Tree
  standard_name: "Capability Taxonomy"
  sections: ["能力层级结构", "能力分类说明", "能力间关系"]

- id: "CV-3"
  representation: gantt
  mermaid_type: gantt
  model_category: Timeline
  standard_name: "Capability Phasing"
  sections: ["能力阶段划分", "里程碑", "时间线", "各阶段资源与效果"]

- id: "CV-4"
  representation: node-link
  mermaid_type: graph
  model_category: Structural
  standard_name: "Capability Dependencies"
  sections: ["能力依赖关系", "逻辑分组", "依赖分析"]

- id: "CV-5"
  representation: table
  mermaid_type: none
  model_category: Mapping
  standard_name: "Capability to Organizational Development Mapping"
  sections: ["能力-组织映射表", "部署阶段", "执行者与位置"]

- id: "CV-6"
  representation: table
  mermaid_type: none
  model_category: Mapping
  standard_name: "Capability to Operational Activities Mapping"
  sections: ["能力-作战活动映射表", "映射分析"]

- id: "CV-7"
  representation: table
  mermaid_type: none
  model_category: Mapping
  standard_name: "Capability to Services Mapping"
  sections: ["能力-服务映射表", "服务启用能力说明"]

# =============================================================================
# DIV — Data and Information Viewpoint (数据与信息视点) — 3 views
# =============================================================================
- id: "DIV-1"
  representation: er-diagram
  mermaid_type: erDiagram
  model_category: Structural
  standard_name: "Conceptual Data Model"
  sections: ["高层数据概念", "实体定义", "实体关系描述", "ER 图"]

- id: "DIV-2"
  representation: er-diagram
  mermaid_type: erDiagram
  model_category: Structural
  standard_name: "Logical Data Model"
  sections: ["数据结构定义", "属性说明", "业务规则约束", "逻辑数据图"]

- id: "DIV-3"
  representation: text
  mermaid_type: none
  model_category: Tabular
  standard_name: "Physical Data Model"
  sections: ["物理实现格式", "消息格式", "文件结构", "物理模式"]

