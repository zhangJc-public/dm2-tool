# DM2 Architecture Concern Templates
# Each concern encapsulates a domain-specific architecture focus with:
#   - expected_data_groups: DM2 data groups that SHOULD activate for this concern
#   - core_views: Focused DoDAF views for this concern (subset of individual group views)
#   - keywords: Domain-specific terms for text matching (AI Agent side)
#
# Used by dm2-propose-workflow: AI Agent loads this file, matches against
# analyze --json activation vectors + user description keywords, then
# presents ranked candidates for Human selection.
#
# Matching algorithm (in SKILL.md, not Python):
#   concern_score = 0.6 * group_activation_overlap + 0.4 * keyword_match
#   where:
#     group_activation_overlap = |active_groups ∩ concern.expected_groups| / |concern.expected_groups|
#     keyword_match = |desc_words ∩ concern.keywords| / |concern.keywords|

concerns:
  - id: "identity-access-control"
    name: "身份认证与访问控制"
    category: "安全架构"
    description: >
      身份管理、认证机制、授权策略、访问控制——谁可以用什么方式访问什么资源，
      常见的 SSO、MFA、OAuth、RBAC 等认证授权基础设施设计
    expected_data_groups:
      - "05-guidance"       # 认证标准 (NIST 800-63, ISO 27001)
      - "08-services"       # 认证服务 (SSO, MFA, OAuth, LDAP)
      - "10-rules"          # 访问控制规则 (RBAC, ABAC, ACL)
      - "11-resource-flow"  # 认证流、令牌传递
    core_views:
      - "OV-1"              # 高级概念图（认证拓扑）
      - "OV-2"              # 作战节点连接（认证端点关系）
      - "SV-1"              # 系统接口描述（认证组件交互）
      - "StdV-1"            # 标准配置文件（认证标准映射）
    keywords:
      - 认证
      - 授权
      - 访问控制
      - 身份管理
      - 单点登录
      - SSO
      - MFA
      - OAuth
      - OIDC
      - SAML
      - LDAP
      - RBAC
      - ABAC
      - ACL
      - 权限
      - 登录
      - 凭证
      - 令牌
      - token
      - 密码
      - 角色
      - 会话
      - 审计

