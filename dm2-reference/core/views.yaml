# DoDAF 视图单一数据源 —— 所有视图信息统一定义于此
# indexer / view_recommender / view_generator / prompts 均从此加载
#
# 新增字段 (2026-05-05):
#   standard_name   - DoDAF V2.02 标准英文名 (Table 1.2-1)
#   model_category  - 标准分类: Structural | Behavioral | Tree | Mapping |
#                     Tabular | Pictorial | Timeline | Ontology (Table 1.2-2)
#   representation  - 输出形式: node-link | tree | org-chart | flowchart |
#                     state-diagram | sequence-diagram | er-diagram | pictorial |
#                     gantt | table | text
#   purpose         - 视图目的 / 回答什么问题
#   sections        - 章节大纲 (替代硬编码模板)
#   required_fields - 视图必须产出的字段列表
views:
  # ═══════════════════════════════════════════════════════════════════════
  # AV — All Viewpoint (全视点) — 2 views
  # ═══════════════════════════════════════════════════════════════════════
  - id: "AV-1"
    name: "概述与摘要信息"
    standard_name: "Overview and Summary Information"
    viewpoint: "AV"
    representation: text
    model_category: Tabular
    groups: ["Guidance", "Project"]
    description: "项目愿景、目标、活动、条件、效果和产出物概述。为所有视图提供架构上下文和范围边界。"
    purpose: |
      1. 描述架构项目的总体愿景、目标与计划
      2. 定义架构范围、边界及关键约束条件
      3. 为所有其他视图提供统一的架构上下文
    sections:
      - "项目概述"
      - "愿景与目标"
      - "范围与边界"
      - "关键指标与效果"
      - "架构上下文说明"
    required_fields:
      - "项目标识"
      - "愿景描述"
      - "架构目标"
      - "范围边界"
      - "关键成功因素"
    priority: 1
    dependencies: ["AV-2", "CV-1"]
    required_data: ["架构概述", "业务目标", "关键成功因素"]

  - id: "AV-2"
    name: "集成字典"
    standard_name: "Integrated Dictionary"
    viewpoint: "AV"
    representation: table
    model_category: Ontology
    groups: ["InformationAndData", "Performer", "Foundation"]
    description: "架构数据仓库，定义整个架构描述中使用的所有术语、缩写和概念。"
    purpose: |
      1. 统一所有视图中的术语定义
      2. 确保跨视图语义一致性
      3. 为 DM2 本体扩展提供入口
    sections:
      - "术语定义表"
      - "缩写表"
      - "概念分类"
      - "引用标准"
    required_fields:
      - "术语"
      - "定义"
      - "来源"
      - "使用范围"
      - "对应的 DM2 概念"
    priority: 1
    dependencies: []
    required_data: ["术语定义", "缩写列表", "标准引用"]

  # ═══════════════════════════════════════════════════════════════════════
  # CV — Capability Viewpoint (能力视点) — 7 views
  # ═══════════════════════════════════════════════════════════════════════
  - id: "CV-1"
    name: "能力愿景"
    standard_name: "Vision"
    viewpoint: "CV"
    representation: text
    model_category: Tabular
    groups: ["Capability", "Project", "Foundation"]
    description: "转型工作能力开发总体愿景，提供能力描述的战略背景和高层范围。"
    purpose: |
      1. 阐述能力开发的战略背景和总体愿景
      2. 定义能力范围和高层差距
      3. 为能力分类和能力阶段化提供基础
    sections:
      - "能力愿景"
      - "战略背景"
      - "能力范围概述"
      - "关键能力差距"
      - "预期效果"
    required_fields:
      - "愿景描述"
      - "战略目标"
      - "能力范围"
      - "能力差距"
      - "预期效果"
    priority: 1
    dependencies: []
    required_data: ["能力愿景", "战略目标", "能力差距"]

  - id: "CV-2"
    name: "能力分类法"
    standard_name: "Capability Taxonomy"
    viewpoint: "CV"
    representation: tree
    model_category: Tree
    groups: ["Capability"]
    description: "能力层级分类结构，描述所有在一次或多次架构描述中引用的能力及其父子关系。"
    purpose: |
      1. 建立能力的层级分类体系
      2. 标识能力的父-子关系和整体-部分关系
      3. 为能力到活动/服务/组织的映射提供结构基础
    sections:
      - "能力层级结构"
      - "能力分类说明"
      - "能力间关系"
      - "分类法覆盖分析"
    required_fields:
      - "能力标识"
      - "能力名称"
      - "父能力"
      - "能力描述"
      - "层级路径"
    priority: 2
    dependencies: ["CV-1"]
    required_data: ["能力分类法", "能力层级结构"]

  - id: "CV-3"
    name: "能力阶段化"
    standard_name: "Capability Phasing"
    viewpoint: "CV"
    representation: gantt
    model_category: Timeline
    groups: ["Capability", "Project"]
    description: "能力在不同时间点或时间段的计划实现。展示活动、条件、效果、规则、资源消耗和度量的阶段划分。"
    purpose: |
      1. 可视化能力开发的时序安排
      2. 定义能力交付的阶段和里程碑
      3. 协调能力开发活动与资源投入
    sections:
      - "能力阶段划分"
      - "里程碑定义"
      - "各阶段能力描述"
      - "时间线与资源概览"
    required_fields:
      - "能力阶段名称"
      - "开始时间"
      - "结束时间"
      - "里程碑"
      - "阶段能力成果"
    priority: 2
    dependencies: ["CV-2", "CV-1"]
    required_data: ["能力发展阶段", "里程碑", "时间表"]

  - id: "CV-4"
    name: "能力依赖"
    standard_name: "Capability Dependencies"
    viewpoint: "CV"
    representation: node-link
    model_category: Structural
    groups: ["Capability", "Activity"]
    description: "计划能力之间的依赖关系和能力的逻辑分组定义。"
    purpose: |
      1. 标识能力之间的依赖关系
      2. 识别能力的逻辑分组和集群
      3. 支持能力开发优先级和风险分析
    sections:
      - "能力依赖关系图"
      - "逻辑分组说明"
      - "关键依赖路径分析"
      - "依赖风险评估"
    required_fields:
      - "源能力"
      - "目标能力"
      - "依赖类型"
      - "依赖强度"
      - "逻辑分组"
    priority: 2
    dependencies: ["CV-2"]
    required_data: ["能力依赖关系", "依赖类型"]

  - id: "CV-5"
    name: "能力-组织映射"
    standard_name: "Capability to Organizational Development Mapping"
    viewpoint: "CV"
    representation: table
    model_category: Mapping
    groups: ["Capability", "OrganizationalStructure"]
    description: "能力需求的组织落实。展示特定阶段的计划能力部署和执行者/位置方案。"
    purpose: |
      1. 将能力分配到组织单元
      2. 标识能力部署的阶段和位置
      3. 验证组织对能力需求的可满足性
    sections:
      - "能力-组织映射表"
      - "部署阶段分析"
      - "执行者与位置说明"
      - "差距与冗余分析"
    required_fields:
      - "能力"
      - "组织单元"
      - "部署阶段"
      - "执行者角色"
      - "位置"
    priority: 2
    dependencies: ["CV-3", "PV-1", "CV-2", "OV-4", "SV-1", "SvcV-1"]
    required_data: ["能力-组织映射", "组织单元", "阶段"]

  - id: "CV-6"
    name: "能力-作战活动映射"
    standard_name: "Capability to Operational Activities Mapping"
    viewpoint: "CV"
    representation: table
    model_category: Mapping
    groups: ["Capability", "Activity"]
    description: "所需能力与支持这些能力的作战活动之间的映射关系（能力视点到作战视点的桥梁）。"
    purpose: |
      1. 建立能力与作战活动的双向追溯
      2. 验证能力对作战需求的覆盖
      3. 标识能力缺口和冗余
    sections:
      - "能力-活动映射表"
      - "满足状态分析"
      - "缺口识别"
      - "CV↔OV 桥梁说明"
    required_fields:
      - "能力"
      - "作战活动"
      - "满足状态"
      - "映射依据"
    priority: 2
    dependencies: ["CV-2", "OV-5b"]
    required_data: ["能力-活动映射", "活动", "满足状态"]

  - id: "CV-7"
    name: "能力-服务映射"
    standard_name: "Capability to Services Mapping"
    viewpoint: "CV"
    representation: table
    model_category: Mapping
    groups: ["Capability", "Services"]
    description: "能力与启用这些能力的服务之间的映射关系（能力视点到服务视点的桥梁）。"
    purpose: |
      1. 建立能力与服务之间的追溯关系
      2. 验证服务对能力需求的覆盖
      3. 标识服务缺口
    sections:
      - "能力-服务映射表"
      - "服务启用分析"
      - "满足状态评估"
      - "CV↔SvcV 桥梁说明"
    required_fields:
      - "能力"
      - "服务"
      - "满足状态"
      - "映射依据"
    priority: 2
    dependencies: ["CV-2", "SvcV-1", "SvcV-4"]
    required_data: ["能力-服务映射", "服务", "满足状态"]

  # ═══════════════════════════════════════════════════════════════════════
  # DIV — Data and Information Viewpoint (数据与信息视点) — 3 views
  # ═══════════════════════════════════════════════════════════════════════
  - id: "DIV-1"
    name: "概念数据模型"
    standard_name: "Conceptual Data Model"
    viewpoint: "DIV"
    representation: er-diagram
    model_category: Structural
    groups: ["InformationAndData", "Foundation", "InformationPedigree"]
    description: "架构所需的高层数据概念及其关系。定义核心实体、属性和实体间的语义关系。"
    purpose: |
      1. 定义架构中的核心数据概念（实体）
      2. 描述实体间的语义关系
      3. 为逻辑和物理数据模型提供基础
    sections:
      - "核心概念/实体定义"
      - "实体关系描述"
      - "ER 图"
      - "语义模型说明"
    required_fields:
      - "实体名称"
      - "实体描述"
      - "关键属性"
      - "关系类型"
      - "关联实体"
    priority: 1
    dependencies: ["OV-2", "OV-5b", "OV-6a"]
    required_data: ["核心概念", "概念关系", "语义模型"]

  - id: "DIV-2"
    name: "逻辑数据模型"
    standard_name: "Logical Data Model"
    viewpoint: "DIV"
    representation: er-diagram
    model_category: Structural
    groups: ["InformationAndData", "ResourceFlow", "InformationPedigree"]
    description: "数据需求文档和结构化业务过程规则。定义数据结构、属性、约束和实体间关系的详细逻辑模型。"
    purpose: |
      1. 定义标准化的数据结构
      2. 描述实体属性的完整定义和约束
      3. 为物理实现提供平台无关的数据设计
    sections:
      - "数据结构定义"
      - "属性与约束说明"
      - "业务规则定义"
      - "逻辑数据图"
    required_fields:
      - "实体名称"
      - "属性列表"
      - "主键"
      - "外键关系"
      - "业务规则约束"
    priority: 3
    dependencies: ["DIV-1"]
    required_data: ["数据结构", "逻辑模型", "实体关系"]

  - id: "DIV-3"
    name: "物理数据模型"
    standard_name: "Physical Data Model"
    viewpoint: "DIV"
    representation: text
    model_category: Tabular
    groups: ["InformationAndData", "Performer", "ResourceFlow"]
    description: "逻辑数据模型实体的物理实现格式，包括消息格式、文件结构、物理模式定义。"
    purpose: |
      1. 定义数据的物理存储和传输格式
      2. 指定数据库模式、消息格式、文件结构
      3. 为系统实现提供可直接使用的数据规约
    sections:
      - "物理实现概述"
      - "消息格式定义"
      - "文件结构说明"
      - "物理模式定义"
    required_fields:
      - "物理实体名"
      - "存储格式"
      - "字段类型与长度"
      - "索引定义"
      - "传输协议"
    priority: 3
    dependencies: ["DIV-2", "SV-1"]
    required_data: ["物理模型", "数据格式", "存储定义"]

  # ═══════════════════════════════════════════════════════════════════════
  # OV — Operational Viewpoint (作战视点) — 9 views
  # ═══════════════════════════════════════════════════════════════════════
  - id: "OV-1"
    name: "高层作战概念图"
    standard_name: "High-Level Operational Concept Graphic"
    viewpoint: "OV"
    representation: pictorial
    model_category: Pictorial
    groups: ["Activity", "Performer", "Location"]
    description: "作战概念的高层图形/文字描述。展示系统边界、主要作战节点和关键活动，不追求细节精确。"
    purpose: |
      1. 以图形化方式传达作战概念的总体意图
      2. 标识系统边界和关键作战节点
      3. 为利益相关方提供直观的架构概览
    sections:
      - "作战概念概述"
      - "系统边界标注"
      - "主要作战节点"
      - "关键活动概述"
      - "概念图"
    required_fields:
      - "作战概念描述"
      - "系统边界"
      - "主要节点清单"
      - "关键活动"
      - "参与组织"
    priority: 1
    dependencies: ["CV-1", "AV-1"]
    required_data: ["作战概念", "关键活动", "参与组织"]
    downstream: ["OV-2", "OV-5a"]

  - id: "OV-2"
    name: "作战资源流描述"
    standard_name: "Operational Resource Flow Description"
    viewpoint: "OV"
    representation: node-link
    model_category: Structural
    groups: ["Activity", "Resource", "Performer", "ResourceFlow"]
    description: "描述作战活动间交换的资源流。标识资源流的源节点、目标节点及关键属性，是使命线分析和信息交换需求规划的基础。"
    purpose: |
      1. 标识关键使命线和作战资源流交换
      2. 定义资源流的源节点与目标节点
      3. 记录资源流的类型、触发条件和关键属性
      4. 为系统接口设计提供作战侧依据
    sections:
      - "作战节点识别"
      - "资源流描述（源 → 目标）"
      - "资源流类型与属性"
      - "与 OV-1 节点一致性验证"
      - "关键使命线分析"
    required_fields:
      - "源节点"
      - "目标节点"
      - "资源类型"
      - "触发条件"
      - "关键性标记"
      - "频率"
    priority: 1
    dependencies: ["OV-1", "OV-4", "OV-5b"]
    required_data: ["活动", "资源", "执行者", "资源流"]
    downstream: ["DIV-1"]

  - id: "OV-3"
    name: "作战资源流矩阵"
    standard_name: "Operational Resource Flow Matrix"
    viewpoint: "OV"
    representation: table
    model_category: Tabular
    groups: ["Activity", "Resource", "ResourceFlow"]
    description: "以矩阵形式描述作战活动间交换的资源及其属性。每行表示一个资源流，列包括源活动、目标活动、资源类型和交换属性。"
    purpose: |
      1. 系统化列出所有作战资源流交换
      2. 标识每个资源流的关键属性（触发条件、频率、重要性）
      3. 作为信息交换需求分析的基础
    sections:
      - "资源流矩阵"
      - "交换属性分析"
      - "关键资源流识别"
      - "与 OV-2 一致性说明"
    required_fields:
      - "源活动"
      - "目标活动"
      - "资源类型"
      - "交换属性"
      - "关键性标记"
      - "频率"
    priority: 2
    dependencies: ["OV-2", "OV-5b", "DIV-2"]
    required_data: ["活动", "资源", "信息交换需求"]

  - id: "OV-4"
    name: "组织关系图"
    standard_name: "Organizational Relationships Chart"
    viewpoint: "OV"
    representation: org-chart
    model_category: Structural
    groups: ["Performer", "OrganizationalStructure"]
    description: "组织的上下文、角色和关系。展示组织间的层级、指挥和协作关系。"
    purpose: |
      1. 定义组织结构层级和角色职责
      2. 展示组织间的指挥和协作关系
      3. 为资源流中的执行者分配提供组织基础
    sections:
      - "组织结构层级"
      - "角色与职责定义"
      - "指挥/协作关系"
      - "组织图"
    required_fields:
      - "组织名称"
      - "角色"
      - "职责描述"
      - "上级组织"
      - "协作组织"
      - "报告关系"
    priority: 1
    dependencies: []
    required_data: ["组织", "角色", "职责", "报告关系"]

  - id: "OV-5a"
    name: "作战活动分解"
    standard_name: "Operational Activity Decomposition Tree"
    viewpoint: "OV"
    representation: tree
    model_category: Tree
    groups: ["Activity", "Capability"]
    description: "能力和作战活动的层级分解结构。每个活动有唯一标识符，以树状结构组织。"
    purpose: |
      1. 建立作战活动的层级分解体系
      2. 确保每个活动有唯一标识符
      3. 为活动到执行者/系统/服务的映射提供结构基础
    sections:
      - "活动层级分解"
      - "活动标识符定义"
      - "活动描述"
      - "分解树"
    required_fields:
      - "活动标识符"
      - "活动名称"
      - "父活动"
      - "活动描述"
      - "层级路径"
    priority: 1
    dependencies: ["OV-1"]
    required_data: ["活动分解结构", "活动层级"]

  - id: "OV-5b"
    name: "作战活动分解（追踪）"
    standard_name: "Operational Activity Model"
    viewpoint: "OV"
    representation: flowchart
    model_category: Behavioral
    groups: ["Activity", "Performer"]
    description: "能力和活动的上下文，以及活动、输入、输出之间的关系。展示活动到执行者的追踪和成本/绩效信息。"
    purpose: |
      1. 展示活动间的输入输出关系流程
      2. 建立活动到执行者的追踪关系
      3. 提供活动的成本和绩效上下文
    sections:
      - "活动模型概述"
      - "活动间输入输出关系"
      - "执行者追踪"
      - "成本/绩效上下文"
      - "活动模型图"
    required_fields:
      - "活动名称"
      - "输入（来源活动/外部）"
      - "输出（目标活动）"
      - "执行者"
      - "成本/绩效指标"
    priority: 2
    dependencies: ["OV-5a", "OV-4"]
    required_data: ["活动", "执行者映射", "追踪关系"]
    downstream: ["SV-4", "SvcV-4", "CV-6", "OV-2", "OV-3", "SV-5a", "SvcV-5", "DIV-1"]

  - id: "OV-6a"
    name: "作战规则追踪"
    standard_name: "Operational Rules Model"
    viewpoint: "OV"
    representation: text
    model_category: Tabular
    groups: ["Activity", "Rules"]
    description: "描述约束作战活动的业务规则。标识规则的适用范围、优先级和约束条件。"
    purpose: |
      1. 识别和记录约束作战活动的业务规则
      2. 定义规则的适用范围和优先级
