name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'CLAUDE.md'
  pull_request:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Validate documentation
        run: |
          python -m dm2 --help
          python -m dm2 version